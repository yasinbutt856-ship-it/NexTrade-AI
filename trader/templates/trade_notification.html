<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#0a0a0f;font-family:'Plus Jakarta Sans',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0">
<tr><td style="padding:40px 20px;">
<table align="center" width="480" cellpadding="0" cellspacing="0" style="background:#111118;border-radius:16px;border:1px solid rgba(255,255,255,0.06);">
<tr><td style="padding:32px;text-align:center;">
<h1 style="color:#00d4aa;font-family:Orbitron,Arial,sans-serif;font-size:18px;margin:0 0 4px;">Trade Executed</h1>
<p style="color:#888;font-size:13px;margin:0 0 20px;">NexTrade AI Bot</p>
<div style="background:#0a0a0f;border-radius:10px;padding:20px;text-align:left;">
<div style="display:flex;justify-content:space-between;margin-bottom:12px;">
<span style="color:#888;font-size:13px;">Symbol</span>
<span style="color:#fff;font-size:14px;font-weight:bold;">{{symbol}}</span>
</div>
<div style="display:flex;justify-content:space-between;margin-bottom:12px;">
<span style="color:#888;font-size:13px;">Action</span>
<span style="color:#{{action_color}};font-size:14px;font-weight:bold;text-transform:uppercase;">{{action}}</span>
</div>
<div style="display:flex;justify-content:space-between;margin-bottom:12px;">
<span style="color:#888;font-size:13px;">Price</span>
<span style="color:#fff;font-size:14px;">${{price}}</span>
</div>
<div style="display:flex;justify-content:space-between;margin-bottom:12px;">
<span style="color:#888;font-size:13px;">Quantity</span>
<span style="color:#fff;font-size:14px;">{{quantity}}</span>
</div>
{{#pnl}}
<div style="display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06);">
<span style="color:#888;font-size:13px;">P&L</span>
<span style="color:{{pnl_color}};font-size:16px;font-weight:bold;">${{pnl}}</span>
</div>
{{/pnl}}
</div>
</td></tr>
<tr><td style="padding:0 32px 24px;text-align:center;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
<p style="color:#555;font-size:11px;margin:0;">NexTrade AI Ltd. &mdash; Automated Trading</p>
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
