services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite+aiosqlite:///./trading.db
      - MEXC_API_KEY=${MEXC_API_KEY}
      - MEXC_API_SECRET=${MEXC_API_SECRET}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-secret}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./data:/app/data

  analyst:
    build:
      context: .
      dockerfile: Dockerfile.analyst
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - MEXC_API_KEY=${MEXC_API_KEY}
      - MEXC_API_SECRET=${MEXC_API_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis; redis.Redis.from_url('redis://redis:6379').ping()\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  trader:
    build:
      context: .
      dockerfile: Dockerfile.trader
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - MEXC_API_KEY=${MEXC_API_KEY}
      - MEXC_API_SECRET=${MEXC_API_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis; redis.Redis.from_url('redis://redis:6379').ping()\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
