version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  analyst:
    build:
      context: .
      dockerfile: Dockerfile.analyst
    depends_on:
      - redis
    env_file:
      - config/.env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  trader:
    build:
      context: .
      dockerfile: Dockerfile.trader
    depends_on:
      - redis
    env_file:
      - config/.env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - redis
    env_file:
      - config/.env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
