strategies:
  rsi:
    enabled: true
    weight: 0.20
    params:
      period: 14
      oversold: 35
      overbought: 65

  macd_cross:
    enabled: true
    weight: 0.15
    params:
      fast: 12
      slow: 26
      signal: 9

  ema_trend:
    enabled: true
    weight: 0.15
    params:
      short_period: 9
      long_period: 21

  volume_breakout:
    enabled: true
    weight: 0.10
    params:
      volume_ma_period: 20
      breakout_multiplier: 1.5

  bollinger_squeeze:
    enabled: true
    weight: 0.10
    params:
      period: 20
      std_dev: 2
      squeeze_threshold: 0.05

  supertrend:
    enabled: true
    weight: 0.10
    params:
      period: 10
      multiplier: 3.0

  adx:
    enabled: true
    weight: 0.10
    params:
      period: 14
      threshold: 25

  ichimoku:
    enabled: true
    weight: 0.10
    params:
      tenkan_period: 9
      kijun_period: 26
      senkou_span_b_period: 52
      displacement: 26

  pullback:
    enabled: true
    weight: 0.10
    params:
      lookback: 14
      sideways_entry_pct: 8
      bear_entry_pct: 15
      reentry_pct: 5

  range:
    enabled: true
    weight: 0.10
    params:
      lookback: 30
      range_threshold: 0.10
      oversold_pct: 20
      overbought_pct: 80

  counter_trend:
    enabled: true
    weight: 0.25
    params:
      rsi_period: 7
      ema_period: 20
      oversold: 30
      overbought: 70
      min_drop_pct: 3

  stoch_rsi:
    enabled: true
    weight: 0.20
    params:
      length: 14
      rsi_length: 14
      k: 3
      d: 3
      oversold: 0.2
      overbought: 0.8

  psar:
    enabled: true
    weight: 0.15
    params:
      af: 0.02
      max_af: 0.2

  mfi:
    enabled: true
    weight: 0.15
    params:
      length: 14
      oversold: 20
      overbought: 80

  vwap:
    enabled: true
    weight: 0.15
    params:
      deviation: 1.0
      lookback: 50

signal_resolution:
  mode: weighted  # weighted | strict | majority
  confidence_threshold: 0.5
  min_signals_required: 2
  action_threshold: 0.15
  paper:
    confidence_threshold: 0.15
    min_signals_required: 1
    action_threshold: 0.05
  strict_overrides:
    - daily_drawdown_exceeded
    - circuit_breaker_active
